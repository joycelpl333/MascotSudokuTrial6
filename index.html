    <!-- Dark mode support -->
    <script>
        // Theme management (session-only, no localStorage)
        let userThemePreference = null;
        
        function initializeTheme() {
            if (userThemePreference === 'dark' || 
                (!userThemePreference && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                updateThemeIcon(true);
            } else {
                document.documentElement.classList.remove('dark');
                updateThemeIcon(false);
            }
        }
        
        function updateThemeIcon(isDark) {
            const themeIcon = document.getElementById('themeIcon');
            const mainThemeIcon = document.getElementById('mainThemeIcon');
            
            if (themeIcon) {
                themeIcon.textContent = isDark ? '☀️' : '🌙';
            }
            if (mainThemeIcon) {
                mainThemeIcon.textContent = isDark ? '☀️' : '🌙';
            }
        }
        
        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            
            if (isDark) {
                document.documentElement.classList.remove('dark');
                userThemePreference = 'light';
                updateThemeIcon(false);
            } else {
                document.documentElement.classList.add('dark');
                userThemePreference = 'dark';
                updateThemeIcon(true);
            }
            
            // Play click sound
            if (audioContext) {
                playClickSound();
            }
        }
        
        // Initialize theme on page load
        initializeTheme();
        
        // Only listen to system changes if user hasn't set a preference
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (!userThemePreference) {
                if (event.matches) {
                    document.documentElement.classList.add('dark');
                    updateThemeIcon(true);
                } else {
                    document.documentElement.classList.remove('dark');
                    updateThemeIcon(false);
                }
            }
        });
    </script>

            const maxSolutions = 2; // We only need to find if there's more than 1
            const startTime = performance.now();
            let recursionDepth = 0;
            let maxDepth = 0;
            let solutionAttempts = 0;
            
            function solvePuzzle(board, solutionCount) {
                recursionDepth++;
                maxDepth = Math.max(maxDepth, recursionDepth);
                solutionAttempts++;
                
                // Timeout protection for very complex puzzles
                if (solutionAttempts > 50000) {
                    console.warn(`   ⚠️ Solution checker timeout after ${solutionAttempts} attempts`);
                    recursionDepth--;
                    return 1; // Assume unique to avoid infinite loops
                }
                
                if (solutionCount >= maxSolutions) {
                    recursionDepth--;
                    return solutionCount;
                }
                
                // Find first empty cell
                for (let row = 0; row < size; row++) {
                    for (let col = 0; col < size; col++) {
                        if (board[row][col] === 0) {
                            // Try each possible number
                            for (let num = 1; num <= size; num++) {
                                if (isValidMove(board, row, col, num)) {
                                    board[row][col] = num;
                                    solutionCount = solvePuzzle(board, solutionCount);
                                    board[row][col] = 0;
                                    
                                    if (solutionCount >= maxSolutions) {
                                        recursionDepth--;
                                        return solutionCount;
                                    }
                                }
                            }
                            recursionDepth--;
                            return solutionCount; // Backtrack
                        }
                    }
                }
                
                // Found a complete solution
                recursionDepth--;
                return solutionCount + 1;
            }
            
            // Create a copy to solve
            const puzzleCopy = puzzle.map(row => [...row]);
            const solutionCount = solvePuzzle(puzzleCopy, 0);
            const solveTime = performance.now() - startTime;
            
            console.log(`   🔍 Solution analysis: ${solutionCount} solution(s) found`);
            console.log(`   ⏱️ Solve time: ${Math.round(solveTime)}ms, attempts: ${solutionAttempts}, max depth: ${maxDepth}`);
            
            return solutionCount === 1;
        }
        
        function countEmptyCells() {
            let count = 0;
            const size = gameState.gridSize;
            for (let row = 0; row < size; row++) {

        function generateCompleteSudoku(gridSize = null) {
            const size = gridSize || gameState.gridSize;
            const board = Array(size).fill().map(() => Array(size).fill(0));
            fillBoardWithSize(board, size);
            return board;
        }
        
        function fillBoardWithSize(board, size) {
            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    if (board[row][col] === 0) {
                        const numbers = Array.from({length: size}, (_, i) => i + 1);
                        shuffleArray(numbers);
                        
                        for (const num of numbers) {
                            if (isValidMoveForSize(board, row, col, num, size)) {
                                board[row][col] = num;
                                if (fillBoardWithSize(board, size)) return true;
                                board[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }
        
function isValidMoveForSize(board, row, col, num, size) {
    const boxRows = size === 9 ? 3 : 2; 
    const boxCols = size === 4 ? 2 : 3; 
    for (let c = 0; c < size; c++) if (board[row][c] === num) return false;
    for (let r = 0; r < size; r++) if (board[r][col] === num) return false;
    const boxRowStart = Math.floor(row / boxRows) * boxRows;
    const boxColStart = Math.floor(col / boxCols) * boxCols;
    for (let r = boxRowStart; r < boxRowStart + boxRows; r++) {
        for (let c = boxColStart; c < boxColStart + boxCols; c++) {
            if (board[r][c] === num) return false;
        }
    }
    return true;
}

            if (puzzlePool.easy.length < puzzlePool.targetPoolSize) {

                for (let i = 0; i < needed; i++) {

        function generatePuzzlesSequentially(puzzleQueue, index) {
            if (index >= puzzleQueue.length) {
                console.log('✅ Background puzzle generation complete!');
                logPuzzlePoolStatus();
                puzzlePool.generating = false;
                return;
            }
            
            const { difficulty, gridSize } = puzzleQueue[index];
            console.log(`🎲 Generating ${difficulty} puzzle ${index + 1}/${puzzleQueue.length}...`);
            
            // Use setTimeout to avoid blocking the UI
            setTimeout(() => {
                try {
                    const puzzle = generateSudokuPuzzle(difficulty, gridSize);
                    puzzlePool[difficulty].push(puzzle);
                    console.log(`✅ ${difficulty} puzzle generated and added to pool`);
                    
                    // Continue with next puzzle
                    generatePuzzlesSequentially(puzzleQueue, index + 1);
                } catch (error) {
                    console.error(`❌ Error generating ${difficulty} puzzle:`, error);
                    // Continue with next puzzle even if one fails
                    generatePuzzlesSequentially(puzzleQueue, index + 1);
                }
            }, 100); // Small delay between puzzles
        }
        
        function getPuzzleFromPool(difficulty) {
            console.log(`🎯 Requesting ${difficulty} puzzle from pool...`);
            
            const pool = puzzlePool[difficulty];
            if (!pool || pool.length === 0) {
                console.warn(`⚠️ No pre-generated ${difficulty} puzzles available, generating on-demand...`);
                // Fall back to on-demand generation
                const gridSize = difficulty === 'trial' ? 4 : 9;
                return generateSudokuPuzzle(difficulty, gridSize);

            // Get the oldest puzzle from the pool
            const puzzle = pool.shift();
            console.log(`✅ Retrieved ${difficulty} puzzle from pool (${pool.length} remaining)`);
            
            // Check if pool needs refilling
            if (pool.length <= puzzlePool.minPoolSize) {

        // Gesture support variables
        let gestureState = {
            isTouch: false,
            startX: 0,
            startY: 0,

            swipeThreshold: 30, // Minimum distance for swipe
            longPressThreshold: 500, // Milliseconds for long press

        };

        // Handle touch start for gesture detection
        function handleTouchStart(event, row, col) {
            const touch = event.touches[0];
            gestureState.isTouch = true;
            gestureState.startX = touch.clientX;
            gestureState.startY = touch.clientY;
            gestureState.startTime = Date.now();
            gestureState.longPressTriggered = false;
            gestureState.targetCell = [row, col];
            
            // Start long press timer
            gestureState.longPressTimer = setTimeout(() => {
                handleLongPress(row, col);
            }, gestureState.longPressThreshold);
            
            // Prevent default to avoid text selection
            event.preventDefault();
        }

        // Handle touch move for swipe detection
        function handleTouchMove(event) {
            if (!gestureState.isTouch) return;
            
            const touch = event.touches[0];
            const deltaX = Math.abs(touch.clientX - gestureState.startX);
            const deltaY = Math.abs(touch.clientY - gestureState.startY);
            
            // If moved significantly, cancel long press
            if (deltaX > 10 || deltaY > 10) {
                if (gestureState.longPressTimer) {
                    clearTimeout(gestureState.longPressTimer);
                    gestureState.longPressTimer = null;
                }
            }
            
            event.preventDefault();
        }

        // Handle touch end for swipe and tap detection
        function handleTouchEnd(event) {
            if (!gestureState.isTouch) return;
            
            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - gestureState.startX;
            const deltaY = touch.clientY - gestureState.startY;
            const deltaTime = Date.now() - gestureState.startTime;
            
            // Clear long press timer
            if (gestureState.longPressTimer) {
                clearTimeout(gestureState.longPressTimer);
                gestureState.longPressTimer = null;
            }
            
            const [row, col] = gestureState.targetCell || [0, 0];
            
            // Check for swipe gestures
            if (Math.abs(deltaX) > gestureState.swipeThreshold || Math.abs(deltaY) > gestureState.swipeThreshold) {
                handleSwipeGesture(deltaX, deltaY);
            } else if (!gestureState.longPressTriggered && deltaTime < 300) {
                // Regular tap - select cell
                selectCell(row, col);
            }
            
            // Reset gesture state
            gestureState.isTouch = false;
            gestureState.longPressTriggered = false;
            gestureState.targetCell = null;
            
            event.preventDefault();
        }

            if (gameState.isPaused) return;
            
            gestureState.longPressTriggered = true;

        // Handle swipe gestures for cell navigation
        function handleSwipeGesture(deltaX, deltaY) {
            if (!gameState.selectedCell || gameState.isPaused) return;
            
            const [currentRow, currentCol] = gameState.selectedCell;
            const size = gameState.gridSize;
            let newRow = currentRow;
            let newCol = currentCol;
            let direction = '';
            
            // Determine swipe direction (prioritize the larger delta)
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipe
                if (deltaX > 0) {
                    // Swipe right
                    newCol = Math.min(currentCol + 1, size - 1);
                    direction = 'right';
                } else {
                    // Swipe left
                    newCol = Math.max(currentCol - 1, 0);
                    direction = 'left';
                }
            } else {
                // Vertical swipe
                if (deltaY > 0) {
                    // Swipe down
                    newRow = Math.min(currentRow + 1, size - 1);
                    direction = 'down';
                } else {
                    // Swipe up
                    newRow = Math.max(currentRow - 1, 0);
                    direction = 'up';
                }
            }
            
            // Only move if position actually changed
            if (newRow !== currentRow || newCol !== currentCol) {
                console.log(`📱 Swipe ${direction}: (${currentRow},${currentCol}) → (${newRow},${newCol})`);
                selectCell(newRow, newCol);
                
                // Play click sound for navigation
                playClickSound();
                
                // Show brief direction indicator
                showGestureMessage(`➡️ Moved ${direction}`);
            }
        }

        function preloadAllImages() {

        // Load image with timeout and better error handling
        function loadImageWithTimeout(url, index, timeout = 3000) {
            return new Promise((resolve) => {
                const img = new Image();
                const startTime = performance.now();
                let completed = false;

                // Set timeout for slow loading images
                const timeoutId = setTimeout(() => {
                    if (!completed) {
                        completed = true;
                        console.warn(`⏰ Timeout loading image ${index + 1}: ${url.substring(0, 50)}...`);
                        resolve({ success: false, reason: 'timeout' });
                    }
                }, timeout);

                img.onload = () => {
                    if (!completed) {
                        completed = true;
                        clearTimeout(timeoutId);
                        imageCache.set(url, img);
                        const loadTime = Math.round(performance.now() - startTime);
                        console.log(`✅ Loaded image ${index + 1}/${imagePool.length} in ${loadTime}ms`);
                        resolve({ success: true });
                    }
                };

                img.onerror = (e) => {
                    if (!completed) {
                        completed = true;
                        clearTimeout(timeoutId);
                        console.warn(`❌ Failed to load image ${index + 1}:`, url);
                        console.warn(`   Error details:`, e);
                        resolve({ success: false, reason: 'error' });
                    }
                };

                // Start loading
                img.src = url;
            });
        }
        
        // Load images in smaller batches to avoid overwhelming browser/network
        async function loadImageBatches(images, batchSize) {
            for (let i = 0; i < images.length; i += batchSize) {
                const batch = images.slice(i, i + batchSize);
                const batchStartTime = performance.now();
                
                console.log(`📦 Loading batch ${Math.floor(i / batchSize) + 1}/${Math.ceil(images.length / batchSize)}: ${batch.length} images...`);
                
                const batchPromises = batch.map((url, index) => 
                    loadImageWithTimeout(url, i + index + 9, 4000) // Longer timeout for background loading
                );
                
                const results = await Promise.all(batchPromises);
                const batchTime = performance.now() - batchStartTime;
                const successCount = results.filter(r => r.success).length;
                
                console.log(`✅ Batch complete in ${Math.round(batchTime)}ms: ${successCount}/${batch.length} loaded`);
                
                // Small delay between batches to not overwhelm the browser
                if (i + batchSize < images.length) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
            
            console.log('🎉 All background image loading complete!');
        }
        
        // Fast parallel image loading with cache optimization and progress tracking
        function waitForImages(gridSize) {
            return new Promise((resolve) => {

                const startTime = performance.now();

                const urls = [];

                for (let num = 1; num <= gridSize; num++) {

                        iconUrls[num] = url;
                        preloadProgress.loaded++;
                        console.log(`⚡ Using cached image for ${num}`);
                    } else {
                        uncachedUrls.push({ url, num });
                    }

                updatePreloadProgress();

                // If all images are cached, resolve immediately
                if (uncachedUrls.length === 0) {
                    const loadTime = performance.now() - startTime;
                    console.log(`🚀 All ${gridSize} images loaded from cache in ${Math.round(loadTime)}ms!`);
                    resolve();
                    return;
                }

                console.log(`📦 Loading ${uncachedUrls.length} new images in parallel...`);

                // Load uncached images in parallel with longer timeout for reliability
                const loadPromises = uncachedUrls.map(({ url, num }) => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        let completed = false;

                        // Longer timeout to ensure images load properly
                        const timeoutId = setTimeout(() => {
                            if (!completed) {
                                completed = true;
                                console.warn(`⏰ Timeout for image ${num}, using fallback`);
                                iconUrls[num] = createFallbackImage(num, gridSize);
                                preloadProgress.loaded++;
                                updatePreloadProgress();
                                resolve({ url, num, success: false, reason: 'timeout' });

                        }, 5000); // Increased to 5 seconds for more reliable loading

                        img.onload = () => {
                            if (!completed) {
                                completed = true;
                                clearTimeout(timeoutId);
                                imageCache.set(url, img);
                                iconUrls[num] = url;
                                preloadProgress.loaded++;
                                updatePreloadProgress();
                                console.log(`✅ Fast loaded image ${num}`);
                                resolve({ url, num, success: true });
                            }
                        };

                        img.onerror = (e) => {
                            if (!completed) {
                                completed = true;
                                clearTimeout(timeoutId);
                                console.warn(`❌ Failed to load image ${num}:`, url);
                                console.warn(`   Using fallback image for number ${num}`);
                                iconUrls[num] = createFallbackImage(num, gridSize);
                                preloadProgress.loaded++;
                                updatePreloadProgress();
                                resolve({ url, num, success: false, reason: 'error' });
                            }
                        };

                        img.src = url;
                    });
                });

                Promise.all(loadPromises).then((results) => {
                    const successful = results.filter(r => r.success);
                    const loadTime = performance.now() - startTime;

                    console.log(`⚡ Fast loading complete in ${Math.round(loadTime)}ms!`);

            gameState.board[lastMove.row][lastMove.col] = lastMove.prevValue;

        function erase() {
            if (!gameState.selectedCell || gameState.isPaused) return;
            
            playClickSound();
            
            const [row, col] = gameState.selectedCell;
            if (gameState.initialBoard[row][col] !== 0) return;
            
            gameState.moves.push({
                row, col,
                prevValue: gameState.board[row][col],
                prevNotes: [...gameState.notes[row][col]]

            gameState.board[row][col] = 0;
            gameState.notes[row][col] = [];

        // Get all possible numbers for a given cell
        function getPossibleNumbers(row, col) {
            if (gameState.board[row][col] !== 0) return []; // Cell already filled
            
            const size = gameState.gridSize;
            const boxSize = size === 4 ? 2 : 3;
            const possible = [];
            
            for (let num = 1; num <= size; num++) {
                if (isValidMove(gameState.board, row, col, num)) {

        // Find naked singles (cells with only one possible number)
        function findNakedSingles() {
            const size = gameState.gridSize;
            const nakedSingles = [];
            
            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    if (gameState.board[row][col] === 0 && gameState.initialBoard[row][col] === 0) {
                        const possible = getPossibleNumbers(row, col);
                        if (possible.length === 1) {
                            nakedSingles.push({
                                row, col,
                                number: possible[0],
                                technique: 'Naked Single',
                                explanation: `Only ${possible[0]} can go in this cell`
                            });
                        }
                    }
                }
            }
            
            return nakedSingles;
        }

        // Find hidden singles (numbers that can only go in one cell within a row/column/box)
function findHiddenSingles() {
    const size = gameState.gridSize;
    const boxRows = size === 9 ? 3 : 2; 
    const boxCols = size === 4 ? 2 : 3; 
    const hiddenSingles = [];
    
    for (let row = 0; row < size; row++) {
        for (let num = 1; num <= size; num++) {
            let numberExists = false;
            for (let col = 0; col < size; col++) if (gameState.board[row][col] === num) { numberExists = true; break; }
            if (numberExists) continue;
            const possibleCols = [];
            for (let col = 0; col < size; col++) {
                if (gameState.board[row][col] === 0 && gameState.initialBoard[row][col] === 0) {
                    if (isValidMove(gameState.board, row, col, num)) possibleCols.push(col);
                }
            }
            if (possibleCols.length === 1) {
                hiddenSingles.push({ row, col: possibleCols[0], number: num, technique: 'Hidden Single (Row)', explanation: `${num} can only go here in row ${row + 1}` });
            }
        }
    }
    
    for (let col = 0; col < size; col++) {
        for (let num = 1; num <= size; num++) {
            let numberExists = false;
            for (let row = 0; row < size; row++) if (gameState.board[row][col] === num) { numberExists = true; break; }
            if (numberExists) continue;
            const possibleRows = [];
            for (let row = 0; row < size; row++) {
                if (gameState.board[row][col] === 0 && gameState.initialBoard[row][col] === 0) {
                    if (isValidMove(gameState.board, row, col, num)) possibleRows.push(row);
                }
            }
            if (possibleRows.length === 1) {
                const alreadyFound = hiddenSingles.some(h => h.row === possibleRows[0] && h.col === col && h.number === num);
                if (!alreadyFound) hiddenSingles.push({ row: possibleRows[0], col, number: num, technique: 'Hidden Single (Column)', explanation: `${num} can only go here in column ${col + 1}` });
            }
        }
    }
    
    for (let boxRowStart = 0; boxRowStart < size; boxRowStart += boxRows) {
        for (let boxColStart = 0; boxColStart < size; boxColStart += boxCols) {
            for (let num = 1; num <= size; num++) {
                let numberExists = false;
                for (let r = boxRowStart; r < boxRowStart + boxRows; r++) {
                    for (let c = boxColStart; c < boxColStart + boxCols; c++) {
                        if (gameState.board[r][c] === num) { numberExists = true; break; }
                    }
                    if (numberExists) break;
                }
                if (numberExists) continue;
                
                const possiblePositions = [];
                for (let r = boxRowStart; r < boxRowStart + boxRows; r++) {
                    for (let c = boxColStart; c < boxColStart + boxCols; c++) {
                        if (gameState.board[r][c] === 0 && gameState.initialBoard[r][c] === 0) {
                            if (isValidMove(gameState.board, r, c, num)) possiblePositions.push([r, c]);
                        }
                    }
                }
                if (possiblePositions.length === 1) {
                    const [row, col] = possiblePositions[0];
                    const alreadyFound = hiddenSingles.some(h => h.row === row && h.col === col && h.number === num);
                    if (!alreadyFound) {
                        const boxNumber = Math.floor(boxRowStart / boxRows) * (size / boxCols) + Math.floor(boxColStart / boxCols) + 1;
                        hiddenSingles.push({ row, col, number: num, technique: 'Hidden Single (Box)', explanation: `${num} can only go here in box ${boxNumber}` });
                    }
                }
            }
        }
    }
    return hiddenSingles;
}

        function useHint() {
            if (gameState.hints === 0 || gameState.isPaused) return;
            
            playClickSound();
            
            const size = gameState.gridSize;
            let hintToUse = null;
            let hintMessage = '';
            
            console.log('🔍 Searching for strategic hints...');
            
            // Step 1: Look for naked singles (highest priority)
            const nakedSingles = findNakedSingles();
            if (nakedSingles.length > 0) {
                hintToUse = nakedSingles[0]; // Take the first one found
                hintMessage = `💡 ${hintToUse.technique}: ${hintToUse.explanation}`;
                console.log(`✅ Found ${nakedSingles.length} naked single(s), using first one`);
            }
            
            // Step 2: Look for hidden singles if no naked singles
            if (!hintToUse) {
                const hiddenSingles = findHiddenSingles();
                if (hiddenSingles.length > 0) {
                    hintToUse = hiddenSingles[0]; // Take the first one found
                    hintMessage = `💡 ${hintToUse.technique}: ${hintToUse.explanation}`;
                    console.log(`✅ Found ${hiddenSingles.length} hidden single(s), using first one`);
                }
            }
            
            // Step 3: Fallback to random hint if no strategic hints available
            if (!hintToUse) {
                console.log('⚠️ No strategic hints found, using random hint');
                const emptyCells = [];
                for (let row = 0; row < size; row++) {
                    for (let col = 0; col < size; col++) {
                        if (gameState.board[row][col] === 0 && gameState.initialBoard[row][col] === 0) {
                            emptyCells.push([row, col]);
                        }
                    }
                }
                
                if (emptyCells.length === 0) return;
                
                const randomIndex = Math.floor(Math.random() * emptyCells.length);
                const [row, col] = emptyCells[randomIndex];
                hintToUse = {
                    row, col,
                    number: gameState.solution[row][col],
                    technique: 'Random Hint',
                    explanation: 'No strategic moves available'
                };
                hintMessage = '💡 Random Hint: Try this number';
            }
            
            // Apply the hint
            const { row, col, number } = hintToUse;
            
            gameState.hints--;
            gameState.moves.push({
                row, col,
                prevValue: gameState.board[row][col],
                prevNotes: [...gameState.notes[row][col]]
            });
            
            gameState.board[row][col] = number;
            gameState.notes[row][col] = [];
            
            // Remove this number from notes in same row, column, and box
            removeNumberFromNotes(row, col, number);
            
            // Highlight the filled cell briefly with technique explanation
            const cell = document.getElementById(`cell-${row}-${col}`);
            cell.classList.add('hint-highlight');
            cell.title = hintMessage; // Add tooltip with explanation
            
            // Show hint message briefly
            showHintMessage(hintMessage);
            
            setTimeout(() => {
                cell.classList.remove('hint-highlight');
                cell.title = ''; // Remove tooltip
            }, 3000); // Longer highlight for reading the explanation
            
            updateDisplay();
            
            if (isPuzzleComplete()) {
                endGame(true);
            }
        }

        // ===== VICTORY CARD & IMAGE SHARING FUNCTIONALITY =====
        
        // Generate a victory card image with mascot
        async function generateVictoryCard() {
            console.log('🖼️ Generating victory card with mascot...');
            
            if (!window.currentVictoryData) {
                console.error('❌ No victory data available for card generation');
                return null;
            }
            
            const { mascotUrl, difficulty, time, gridSize } = window.currentVictoryData;
            
            // Create canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size for social media friendly aspect ratio
            canvas.width = 800;
            canvas.height = 1000;
            
            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#FFE5B4'); // Light orange
            gradient.addColorStop(0.5, '#FFEFD5'); // Papaya whip
            gradient.addColorStop(1, '#FFF8DC'); // Cornsilk
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add border
            ctx.strokeStyle = '#E39F0E';
            ctx.lineWidth = 12;
            ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);
            
            try {
                // Load and draw mascot image
                const mascotImage = await loadImageForCanvas(mascotUrl);
                if (mascotImage) {
                    const mascotSize = 200;
                    const mascotX = (canvas.width - mascotSize) / 2;
                    const mascotY = 120;
                    
                    // Draw golden circle background for mascot
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(mascotX + mascotSize/2, mascotY + mascotSize/2, mascotSize/2 + 15, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // Draw mascot with circular clip
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(mascotX + mascotSize/2, mascotY + mascotSize/2, mascotSize/2, 0, 2 * Math.PI);
                    ctx.clip();
                    ctx.drawImage(mascotImage, mascotX, mascotY, mascotSize, mascotSize);
                    ctx.restore();
                }
            } catch (error) {
                console.warn('⚠️ Could not load mascot image for victory card:', error);
            }
            
            // Draw celebration text
            ctx.textAlign = 'center';
            
            // Title
            ctx.fillStyle = '#E39F0E';
            ctx.font = 'bold 64px serif';
            ctx.fillText('🎉 Victory! 🎉', canvas.width / 2, 80);
            
            // Mascot Sudoku title
            ctx.fillStyle = '#D4700E';
            ctx.font = 'bold 42px serif';
            ctx.fillText('Mascot Sudoku', canvas.width / 2, 380);
            
            // Stats background
            const statsY = 450;
            const statsHeight = 280;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fillRect(60, statsY, canvas.width - 120, statsHeight);
            ctx.strokeStyle = '#E39F0E';
            ctx.lineWidth = 4;
            ctx.strokeRect(60, statsY, canvas.width - 120, statsHeight);
            
            // Game stats
            ctx.fillStyle = '#2C1810';
            ctx.font = 'bold 36px serif';
            
            const difficultyEmoji = difficulty === 'trial' ? '🎯' : difficulty === 'easy' ? '🌟' : '🔥';
            const difficultyText = `${difficultyEmoji} ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)} Mode`;
            ctx.fillText(difficultyText, canvas.width / 2, statsY + 60);
            
            ctx.font = 'bold 32px serif';
            ctx.fillText(`⏱️ Time: ${time}`, canvas.width / 2, statsY + 120);
            ctx.fillText(`📐 Grid: ${gridSize}x${gridSize}`, canvas.width / 2, statsY + 170);
            
            // Achievement message
            ctx.fillStyle = '#E39F0E';
            ctx.font = 'bold 28px serif';
            ctx.fillText('Well done, puzzle master!', canvas.width / 2, statsY + 230);
            
            // Bottom message
            ctx.fillStyle = '#666';
            ctx.font = '24px serif';
            ctx.fillText('Play Mascot Sudoku', canvas.width / 2, 800);
            
            // App promotion
            ctx.fillStyle = '#999';
            ctx.font = '20px serif';
            ctx.fillText('Cute mascots • Brain training • Multiple difficulties', canvas.width / 2, 840);
            
            // Hashtags
            ctx.fillStyle = '#E39F0E';
            ctx.font = 'bold 18px serif';
            ctx.fillText('#MascotSudoku #PuzzleGame #Victory', canvas.width / 2, 920);
            
            console.log('✅ Victory card generated successfully');
            return canvas;
        }
        
        // Helper function to load image for canvas
        function loadImageForCanvas(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous'; // Try to handle CORS
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error(`Failed to load image: ${url}`));
                img.src = url;
            });
        }

        // Copy text to clipboard
        function copyToClipboard(text, button) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    console.log('✅ Text copied to clipboard');
                    
                    // Update button to show success - handle different button styles
                    const originalHTML = button.innerHTML;
                    const originalText = button.textContent;
                    
                    // Update button content
                    if (button.querySelector('img')) {
                        // Button has image - update text part
                        button.innerHTML = button.innerHTML.replace(/<span[^>]*>.*<\/span>/, '<span class="text-xs">✅ Copied!</span>');
                    } else {
                        // Text-only button
                        button.textContent = '✅ Copied!';
                    }
                    
                    button.disabled = true;
                    
                    // Remove various possible background classes and add success
                    button.classList.remove('bg-blue-500', 'hover:bg-blue-600', 'bg-white-500', 'hover:bg-white-600');
                    button.classList.add('bg-green-500');
                    
                    setTimeout(() => {
                        button.innerHTML = originalHTML;
                        button.disabled = false;
                        button.classList.remove('bg-green-500');
                        button.classList.add('bg-blue-500', 'hover:bg-blue-600');
                    }, 2000);
                    
                    showShareFeedback('Copied to clipboard! 📋');
                }).catch((error) => {
                    console.log('❌ Failed to copy to clipboard:', error);
                    showShareFeedback('Unable to copy. Please select and copy manually.', 'error');
                });
            } else {
                // Fallback for older browsers - try to select text manually
                try {
                    // Create a temporary textarea with the text
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    textarea.setSelectionRange(0, 99999); // For mobile devices
                    
                    // Try execCommand as fallback
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    
                    if (successful) {
                        showShareFeedback('Copied to clipboard! 📋');
                        // Update button
                        const originalHTML = button.innerHTML;
                        button.innerHTML = button.innerHTML.includes('img') ? 
                            button.innerHTML.replace(/<span[^>]*>.*<\/span>/, '<span class="text-xs">✅ Copied!</span>') : 
                            '✅ Copied!';
                        button.disabled = true;
                        button.classList.add('bg-green-500');
                        
                        setTimeout(() => {
                            button.innerHTML = originalHTML;
                            button.disabled = false;
                            button.classList.remove('bg-green-500');
                        }, 2000);
                    } else {
                        throw new Error('execCommand failed');
                    }
                } catch (fallbackError) {
                    console.log('❌ All copy methods failed:', fallbackError);
                    showShareFeedback('Please manually select and copy the text above.', 'info');
                }
            }
        }

        // Generate shareable puzzle summary
        function generatePuzzleSummary() {
            const difficulty = gameState.difficulty;

            const completionTime = gameState.startTime ? Date.now() - gameState.startTime : 0;
            const minutes = Math.floor(completionTime / 60000);
            const seconds = Math.floor((completionTime % 60000) / 1000);
            const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            return {
                difficulty: difficulty,
                gridSize: gridSize,
                time: timeString,
                lives: gameState.lives,
                hintsUsed: (difficulty === 'easy' ? 5 : 2) - gameState.hints,
                moves: gameState.moves.length,
                challengeCode: generateChallengeCode()
            };
        }

 // 阻止右鍵選單

// 阻止 F12 和常見的開發者工具快捷鍵
document.onkeydown = (e) => {
    if (e.keyCode === 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67))) {
        return false;
    }
};
        
// =============================================================================
// ⌨️ 智慧鍵盤與無障礙管理器 (Smart Keyboard & Accessibility Manager)
// =============================================================================
document.addEventListener('keydown', (e) => {
    // 1. 偵測目前是否有 Modal 正在顯示 (包含動態生成的 progressModal)
    const modals = [
        document.getElementById('difficultyModal'),
        document.getElementById('gameEndModal'),
        document.getElementById('pauseOverlay'),
        document.getElementById('progressModal')
    ];
    
    // 尋找第一個確實存在、且沒有被 hidden 隱藏的 Modal
    const activeModal = modals.find(modal => modal && !modal.classList.contains('hidden'));

    // ==== 【模式 A：Modal 開啟中 (安全焦點鎖定 Focus Trap)】 ====
    if (activeModal) {
        if (e.key === 'Tab') {
            // 只抓取「看得到」且「未被禁用」的可互動元素
            const focusableElements = Array.from(activeModal.querySelectorAll('button, a, input, [tabindex]:not([tabindex="-1"])'))
                .filter(el => !el.disabled && el.offsetParent !== null);

            if (focusableElements.length === 0) return;

            const firstElement = focusableElements[0];
            const lastElement = focusableElements[focusableElements.length - 1];

            // 核心安全機制：如果焦點不小心掉到 Modal 外面，強制抓回第一個元素
            if (!activeModal.contains(document.activeElement)) {
                firstElement.focus();
                e.preventDefault();
                return;
            }

            // 處理 Shift + Tab (倒退選取)
            if (e.shiftKey && document.activeElement === firstElement) {
                lastElement.focus();
                e.preventDefault();
            } 
            // 處理單純 Tab (正向選取)
            else if (!e.shiftKey && document.activeElement === lastElement) {
                firstElement.focus();
                e.preventDefault();
            }
        }
        // 如果是在 Modal 裡面按 Enter 或上下左右，就交給瀏覽器原生處理，我們不干涉
        return; 
    }

    // ==== 【模式 B：遊戲進行中 (網格導航與數字輸入)】 ====
    // 確保遊戲容器是顯示的，且遊戲未暫停
    const gameContainer = document.getElementById('gameContainer');
    if (!gameContainer || gameContainer.style.display === 'none' || gameState.isPaused) return;

    // 1. 數字鍵盤輸入 (1-9) -> 自動填入選取的格子
    if (/^[1-9]$/.test(e.key)) {
        const num = parseInt(e.key, 10);
        if (num <= gameState.gridSize && gameState.selectedCell) {
            selectNumber(num);
            e.preventDefault();
        }
    } 
    // 2. 刪除與倒退鍵 (Backspace / Delete) -> 清除該格數字
    else if (e.key === 'Backspace' || e.key === 'Delete') {
        erase();
        e.preventDefault();
    }
    // 3. 復原 (Ctrl+Z 或 Cmd+Z)
    else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
        undo();
        e.preventDefault();
    }
    // 4. 方向鍵導覽 (Arrow Keys) -> 順滑移動格子
    else if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault(); // 防止網頁跟著方向鍵捲動

        // 如果玩家還沒選取任何格子就按方向鍵，預設選取左上角 (0, 0)
        if (!gameState.selectedCell) {
            selectCell(0, 0);
            return;
        }
        
        let [r, c] = gameState.selectedCell;
        const maxIndex = gameState.gridSize - 1;

        if (e.key === 'ArrowUp') r = Math.max(0, r - 1);
        if (e.key === 'ArrowDown') r = Math.min(maxIndex, r + 1);
        if (e.key === 'ArrowLeft') c = Math.max(0, c - 1);
        if (e.key === 'ArrowRight') c = Math.min(maxIndex, c + 1);
        
        selectCell(r, c); // 呼叫你的 selectCell，它裡面已經有完美的 focus() 邏輯了
    }
});

// =============================================================================
// 📊 STATS MANAGER (Local Storage)
// =============================================================================
const StatsManager = {
    // 預設數據結構
    getStats() {
        const defaultStats = {
            gamesPlayed: 0,
            wins: 0,
            bestTime: null, // 秒數
            lastWinDate: null,
            currentStreak: 0
        };
        const saved = localStorage.getItem('sudoku_stats');
        return saved ? JSON.parse(saved) : defaultStats;
    },

    saveStats(stats) {
        localStorage.setItem('sudoku_stats', JSON.stringify(stats));
        // TODO: 之後整合 Supabase 時，在這裡呼叫同步函數
    },

    updateGameResult(won, timeSeconds) {
        const stats = this.getStats();
        stats.gamesPlayed++;
        
        if (won) {
            stats.wins++;
            if (!stats.bestTime || timeSeconds < stats.bestTime) {
                stats.bestTime = timeSeconds;
            }
            // 計算連續勝場 (簡單邏輯)
            stats.currentStreak++;
        } else {
            stats.currentStreak = 0;
        }
        
        this.saveStats(stats);
    }
};

// =============================================================================
// 📅 DAILY CHALLENGE GENERATOR
// =============================================================================
function getDailySeed() {
    const today = new Date().toDateString(); // 例如 "Thu Jul 09 2026"
    // 將日期字串轉換為數字種子
    let seed = 0;
    for (let i = 0; i < today.length; i++) {
        seed += today.charCodeAt(i);
    }
    return seed;
}


// 遊戲獲勝時
function onWin(timeTaken) {
    StatsManager.updateGameResult(true, timeTaken);
    // 顯示統計數據到 Modal 內
    showGameEndModal(true, timeTaken); 
}

// 輔助函數：切換 Body 捲動狀態
function toggleBodyScroll(lock) {
    if (lock) {
        document.body.classList.add('body-no-scroll');
    } else {
        document.body.classList.remove('body-no-scroll');
    }
}

// 修改你開啟 Modal 的函數（範例）
function openModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) {
        modal.classList.remove('hidden');
        // 除了 gameEndModal 之外，通通鎖死捲動
        if (modalId !== 'gameEndModal') {
            toggleBodyScroll(true);
        }
    }
}

// 修改你關閉 Modal 的函數（範例）
function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) {
        modal.classList.add('hidden');
        // 檢查是否還有其他 Modal 開啟，如果沒有，就解鎖
        const activeModals = document.querySelectorAll('.fixed:not(.hidden)');
        if (activeModals.length === 0) {
            toggleBodyScroll(false);
        }
    }
}
